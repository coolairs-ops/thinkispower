name: E2E Tests
on:
  push:
    paths:
      - 'apps/web/**'
      - 'apps/api/src/**'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: platform_secret
          POSTGRES_DB: platform
        ports: ['5432:5432']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install & build API
        working-directory: apps/api
        run: |
          cp .env.example .env
          npm ci
          npx prisma generate
          npx prisma db push
          npm run build
          npm run start:prod &
          sleep 5

      - name: Install & start frontend
        working-directory: apps/web
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:3001" > .env.local
          npm ci --legacy-peer-deps
          npx next build
          npx next start -p 3003 &
          sleep 5

      - name: Run E2E tests
        working-directory: apps/web
        run: |
          npx playwright install chromium --with-deps
          npx playwright test --project=chromium -g "project-spec|project-delivery|project-deploy|project-idea" --reporter=list

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
