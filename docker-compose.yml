services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  cloudecode:
    build:
      context: internal/cloudecode
      dockerfile: Dockerfile
    environment:
      PORT: 5000
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_MODEL: deepseek-chat
    env_file:
      - apps/api/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  cc-bridge:
    build:
      context: internal/cc-bridge
      dockerfile: Dockerfile
    environment:
      PORT: 5001
      CLOUDECODE_URL: http://cloudecode:5000
      MAX_CONCURRENCY: "2"
    ports:
      - "5001:5001"
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
    environment:
      PORT: 3003
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3003:3003"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: "postgresql://platform:platform_secret@postgres:5432/platform"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret
      MINIO_BUCKET: platform-assets
      MINIO_PUBLIC_URL: http://localhost:9000
      JWT_SECRET: change-me-to-a-random-string
      CLOUDECODE_API_URL: http://cloudecode:5000
      CC_BRIDGE_URL: http://cc-bridge:5001
    env_file:
      - apps/api/.env
    ports:
      - "3001:3001"
    volumes:
      - deliveries:/app/.hermes/deliveries
      - //var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker 一键部署
    depends_on:
      - postgres
      - redis
      - minio
      - cloudecode
      - cc-bridge
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  deliveries:
