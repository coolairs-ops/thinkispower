version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
      POSTGRES_DB: platform
    # ports: 移除主机映射避免冲突，N8N 通过内部网络访问 postgres:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # ports: 移除主机映射避免冲突，N8N 通过内部网络访问 redis:6379
    volumes:
      - redisdata:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: platform
      DB_POSTGRESDB_PASSWORD: platform_secret
      N8N_METRICS: false
      N8N_PERSONALIZATION_ENABLED: false
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n
      - ./internal/n8n-workflows:/workflows
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  n8ndata:
