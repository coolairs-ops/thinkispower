<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>终稿交付 - 实时进度演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'SF Mono','Fira Code',monospace}
.panel{width:680px;background:#0d1117;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.header{background:#161b22;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d}
.dot{width:12px;height:12px;border-radius:50%}
.r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
.title{color:#8b949e;font-size:12px;margin-left:8px;flex:1}
.status{color:#3fb950;font-size:11px}
.body{padding:12px 16px;max-height:500px;overflow-y:auto;font-size:12px;line-height:1.8}
.step{margin:4px 0}
.step .tag{display:inline-block;padding:0 4px;border-radius:3px;font-size:10px;margin-right:4px}
.tag.ok{background:#1b3a1b;color:#3fb950}
.tag.fail{background:#3a1a1a;color:#f85149}
.tag.run{background:#1a3a4a;color:#79c0ff}
.tag.wait{background:#21262d;color:#484f58}
.progress-bar{width:100%;height:4px;background:#21262d;border-radius:2px;margin:8px 0}
.progress-fill{height:4px;background:#3fb950;border-radius:2px;transition:width 0.5s}
.log{color:#8b949e}
.log .file{color:#58a6ff}
.log .ok{color:#3fb950}
.log .err{color:#f85149}
.log .warn{color:#d29922}
.cursor{color:#58a6ff;animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div class="panel" id="panel">
  <div class="header">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="title">终稿交付 · 电商客服系统</span>
    <span class="status" id="status">🔄 生成中...</span>
  </div>
  <div class="body" id="body">
    <div class="log">$ hermes deliver --production a5a1f77b</div>
    <div class="log" style="color:#58a6ff">▸ 连接 CC Bridge... ✅</div>
  </div>
  <div class="header" style="border-top:1px solid #30363d;padding:6px 16px">
    <span style="color:#8b949e;font-size:10px" id="time">0:00</span>
  </div>
</div>

<script>
const steps = [
  {t:0.5,type:'info',text:'启动生产交付流水线'},
  {t:1.5,type:'step',name:'需求分析',text:'解析项目结构...'},
  {t:2.5,type:'step',name:'需求分析',text:'提取 4 个模块 + 8 个 API 端点'},
  {t:3,type:'gen',file:'backend/package.json',text:'100%'},
  {t:4,type:'gen',file:'backend/src/index.ts',text:'100%'},
  {t:5,type:'gen',file:'backend/src/routes/users.ts',text:'100%'},
  {t:6,type:'gen',file:'backend/src/routes/knowledge.ts',text:'100%'},
  {t:7,type:'gen',file:'backend/src/routes/auth.ts',text:'100%'},
  {t:8,type:'gen',file:'database/schema.sql',text:'100%'},
  {t:8.5,type:'gen',file:'frontend/index.html',text:'100%'},
  {t:9,type:'step',name:'代码生成',text:'完成 9 个文件'},
  {t:10,type:'check',name:'TypeScript编译',text:'运行中...'},
  {t:11,type:'check',name:'TypeScript编译',text:'✅ 通过'},
  {t:12,type:'check',name:'ESLint',text:'✅ 通过 (3 warnings)'},
  {t:13,type:'check',name:'安全扫描',text:'✅ 通过 (2 个提示)'},
  {t:14,type:'test',text:'users.spec.ts · should create user'},
  {t:14.5,type:'test',text:'users.spec.ts · ✅ passed (12ms)'},
  {t:15,type:'test',text:'auth.spec.ts · should login'},
  {t:15.3,type:'test',text:'auth.spec.ts · ✅ passed (8ms)'},
  {t:16,type:'test',text:'knowledge.spec.ts · should search'},
  {t:16.5,type:'test',text:'knowledge.spec.ts · ✅ passed (5ms)'},
  {t:17,type:'test',text:'integration.spec.ts · end-to-end'},
  {t:18.5,type:'test',text:'integration.spec.ts · ❌ timeout (fixing...)'},
  {t:19.5,type:'test',text:'integration.spec.ts · 🔄 retry 1/2'},
  {t:20.5,type:'test',text:'integration.spec.ts · ✅ passed (1200ms)'},
  {t:21,type:'step',name:'测试',text:'6/6 通过'},
  {t:22,type:'deploy',text:'打包 Docker 镜像...'},
  {t:23,type:'deploy',text:'启动容器 think-is-power-prod-1'},
  {t:24,type:'deploy',text:'健康检查...'},
  {t:25,type:'deploy',text:'✅ 上线成功！'},
  {t:26,type:'done',text:'http://localhost:3002/api/deploy/a5a1f77b'}
];

const body = document.getElementById('body');
const status = document.getElementById('status');
const timeEl = document.getElementById('time');
let startTime = Date.now();

function addLine(html) {
  body.innerHTML += html + '\n';
  body.scrollTop = body.scrollHeight;
}

function updateTime(t) {
  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  timeEl.textContent = Math.floor(t/60)+':'+String(Math.floor(t%60)).padStart(2,'0');
}

// Add first line
addLine('<div class="log">$ hermes deliver --production a5a1f77b</div>');
addLine('<div class="log" style="color:#58a6ff">▸ 连接 CC Bridge... ✅</div>');

let totalTests = 0, passedTests = 0;

steps.forEach(s => {
  setTimeout(() => {
    let html = '<div class="step">';
    switch(s.type) {
      case 'info':
        html += '<span style="color:#8b949e">  ℹ '+s.text+'</span>';
        status.textContent = '🔄 '+s.text;
        break;
      case 'step':
        html += '<span class="tag ok">'+s.name+'</span>';
        html += '<span style="color:#c9d1d9">'+s.text+'</span>';
        status.textContent = '🔄 '+s.name;
        break;
      case 'gen':
        html += '  <span class="log"><span class="file">✦ '+s.file+'</span> '+s.text+'</span>';
        status.textContent = '🔄 生成 '+s.file.split('/').pop();
        break;
      case 'check':
        const ok = s.text.includes('✅');
        html += '<span class="tag '+(ok?'ok':'warn')+'">'+s.name+'</span>';
        html += '<span class="log '+(ok?'ok':'warn')+'">'+s.text+'</span>';
        break;
      case 'test':
        if (s.text.includes('✅')) { passedTests++; html += '<span class="log ok">  ✅ '+s.text.replace('✅ ','')+'</span>'; }
        else if (s.text.includes('❌')) html += '<span class="log err">  ❌ '+s.text.replace('❌ ','')+'</span>';
        else if (s.text.includes('🔄')) html += '<span class="log warn">  🔄 '+s.text.replace('🔄 ','')+'</span>';
        else { totalTests++; html += '<span class="log">  ⏳ '+s.text+'</span>'; }
        status.textContent = '🧪 测试 '+passedTests+'/'+(totalTests||6);
        break;
      case 'deploy':
        html += '<span class="tag run">部署</span><span class="log">'+s.text+'</span>';
        status.textContent = '🚀 '+s.text;
        break;
      case 'done':
        html += '<br><span style="color:#3fb950;font-size:14px">🎉 生产交付完成！</span>';
        html += '<br><a style="color:#58a6ff;font-size:12px" href="'+s.text+'">🔗 '+s.text+'</a>';
        html += '<br><span style="color:#8b949e;font-size:10px">admin@123.com / admin123</span>';
        status.textContent = '✅ 已上线';
        break;
    }
    html += '</div>';
    addLine(html);
    updateTime(s.t);
  }, s.t * 1000);
});

setInterval(() => updateTime((Date.now()-startTime)/1000), 1000);
</script>

</body>
</html>
